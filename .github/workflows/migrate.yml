name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Apply migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSSWORD }}
        run: |
          DB_HOST=$(dig +short A db.mngqmfvsxcqjhsgkbyju.supabase.co | tail -1)
          echo "Connecting to: $DB_HOST"
          psql "postgresql://postgres@${DB_HOST}:5432/postgres?sslmode=require" \
            -f supabase/migrations/20260303_add_game_datetime.sql
