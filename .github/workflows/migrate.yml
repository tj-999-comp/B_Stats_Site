name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Apply migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSSWORD }}
        run: |
          psql "postgresql://postgres.mngqmfvsxcqjhsgkbyju@aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f supabase/migrations/20260303_add_game_datetime.sql
