name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Apply migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSSWORD }}
          PGUSER: "postgres.mngqmfvsxcqjhsgkbyju"
          PGHOST: "aws-0-ap-southeast-1.pooler.supabase.com"
          PGPORT: "5432"
          PGDATABASE: "postgres"
          PGSSLMODE: "require"
        run: |
          psql -f supabase/migrations/20260303_add_game_datetime.sql
